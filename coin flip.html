<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip</title>
</head>
<body>
    <button onclick="flipCoin('Heads');">Heads</button>
    <button onclick="flipCoin('Tails');">Tails</button>
    <button onclick="
     score.Wins = 0;
     score.Losses = 0;
     score.Ties = 0;
     localStorage.removeItem('score');
      "> Reset Score</button>
      
    <script>

        let score = JSON.parse(localStorage.getItem('score'));

        if(score === null)  {
           score = { 
            Wins: 0,
            Ties: 0,
            Losses: 0
        };
    }

        function flipCoin(yourMove){
            let computerMove = pickComputerMove();
            let output = '';

            if(yourMove === computerMove) {
                output = 'Tie, flip again?';
            }else if (yourMove === 'Heads' && computerMove === 'Tails') {
                output = 'You win!';
            }else{
                output = 'You lose'
            }

            if(output === 'You win!'){
                score.Wins += 1;
            }else if(output === 'Tie, flip again?'){
                score.Ties += 1;
            }else if(output === 'You lose'){
                score.Losses += 1;
            }
            
          localStorage.setItem('score', JSON.stringify(score));

         alert(`You called ${yourMove}, computer called ${computerMove}, ${output}
Wins: ${score.Wins}, Ties: ${score.Ties}, Losses: ${score.Losses}`);
 }
          function pickComputerMove(){
             const flip = Math.random();
             
             if(flip <= 0.5){
                return 'Heads';
             }else{
                return 'Tails';
             }
        }
        
    </script>
</body>
</html>
