<!DOCTYPE html>
<html>
<head>
  <title>Number Analyzer</title>
</head>
<body>

  <h1>Number Analyzer</h1>

  <input type="text" id="numberInput" placeholder="Enter a number">
  <button id="analyzeBtn">Analyze</button>

  <p id="result"></p>

  <script>
        const input = document.querySelector('#numberInput');
        const button = document.querySelector('#analyzeBtn');
        const result = document.querySelector('#result');

        function squareNumber(num) {
            return num * num;
        }

        function isEven(num) {
            return num % 2 === 0;
        }

        function numberSign(num) {
            if (num > 0) return "positive";
            if (num < 0) return "negative";
            return "zero";
        }

        button.addEventListener('click', function () {
            const userNumber = Number(input.value);

            if (isNaN(userNumber) || input.value.trim() === '') {
                result.textContent = "Please enter a valid number!";
            } else {
                result.textContent = `
                    Square: ${squareNumber(userNumber)}\n
                    Type: ${isEven(userNumber) ? "Even" : "Odd"}\n
                    Sign: ${numberSign(userNumber)}
                `;
            }
        });
  </script>
</body>
</html>
