<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Assignment - Animated Dark Dashboard</title>
<style>
* { 
    margin:0;
    padding:0; 
    box-sizing:border-box; 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
}

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#f0f0f0;
    padding:40px 10px;
    overflow-x:hidden;
}

.container {
    width:100%;
    max-width:450px;
    display:flex;
    flex-direction:column;
    gap:20px;
    opacity:0;
    transform:translateY(20px);
    animation:fadeInUp 0.8s forwards;
    animation-delay:0.2s;
}

@keyframes fadeInUp {
    to { opacity:1; transform:translateY(0); }
}

h2 {
    text-align:center;
    color:#00bcd4;
    margin-bottom:10px;
    font-weight:700;
}

section {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius:12px;
    padding:20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    transition: transform 0.25s, box-shadow 0.25s;
    opacity:0;
    transform:translateY(10px);
    animation:fadeInUp 0.5s forwards;
    animation-delay:0.3s;
}

section:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
}

section p {
    margin:6px 0;
}

input[type="text"] {
    width:100%;
    padding:12px 14px;
    border-radius:6px;
    border:none;
    outline:none;
    background: rgba(255,255,255,0.1);
    color:#f0f0f0;
    font-size:14px;
    margin-top:5px;
    margin-bottom:10px;
    transition:0.25s;
}

input[type="text"]::placeholder { color: rgba(255,255,255,0.6); }

input[type="text"]:focus {
    box-shadow: 0 0 8px #00bcd4;
    background: rgba(255,255,255,0.15);
}

button {
    padding:10px 16px;
    font-size:14px;
    font-weight:600;
    border-radius:6px;
    border:none;
    cursor:pointer;
    transition:0.25s;
    background-color:#00bcd4;
    color:#fff;
    margin-right:6px;
    margin-top:5px;
}

button:hover {
    background-color:#00acc1;
    transform:scale(1.03);
}

button:disabled { background:#555; cursor:not-allowed; }

.output {
    margin-top:8px;
    font-weight:600;
    min-height:22px;
    transition: all 0.4s ease;
}

.success { color:#4CAF50; text-shadow:0 0 6px rgba(76,175,80,0.6); }
.error { color:#ff4d4d; text-shadow:0 0 6px rgba(255,77,77,0.6); }

.coin-buttons {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.coin-output {
    display:inline-block;
    background: linear-gradient(45deg,#ffd700,#ffb800);
    padding:6px 12px;
    border-radius:6px;
    margin-top:6px;
    text-align:center;
    font-weight:600;
    color:#000;
    box-shadow: 0 0 8px rgba(255,215,0,0.7);
    animation:glow 1.2s infinite alternate;
}

@keyframes glow {
    0% { box-shadow: 0 0 6px rgba(255,215,0,0.4); }
    100% { box-shadow: 0 0 12px rgba(255,215,0,0.8); }
}

.subscribe-section button { width:100%; }

</style>
</head>
<body>

<div class="container">
    <h2>DOM Assignment - Dark Dashboard</h2>

    <!-- Subscribe -->
    <section class="subscribe-section">
        <button class="js-subscribe-button" onclick="
            document.querySelector('.js-subscribe-button').innerHTML = 'Subscribed';
        ">Subscribe</button>
    </section>

    <!-- Shipping Calculator -->
    <section>
        <p>Amazon Shipping Calculator</p>
        <p>Orders under $40 = +$10 shipping</p>
        <p>Orders over $40 = Free shipping</p>
        <input type="text" class="js-calculate-button" placeholder="Cost of order" onkeydown="calculateShippingKeyDown(event);">
        <button type="submit" onclick="calculateShipping();">Submit</button>
        <p class="js-order-cost output"></p>
    </section>

    <!-- Name Input -->
    <section>
        <input type="text" class="js-input-name" placeholder="Enter Your Name" onkeydown="nameDisplayKeyDown(event);">
        <button type="submit" onclick="nameDisplay();">Submit</button>
        <p class="js-name-display output"></p>
    </section>

    <!-- Coin Flip -->
    <section>
        <p>Coin Flip</p>
        <div class="coin-buttons">
            <button onclick="document.querySelector('.js-coin-output').innerHTML = 'You chose Heads'">Heads</button>
            <button onclick="document.querySelector('.js-coin-output').innerHTML = 'You chose Tails'">Tails</button>
        </div>
        <p class="js-coin-output coin-output"></p>
    </section>
</div>

<script>
function calculateShippingKeyDown(event){
    if(event.key === 'Enter') calculateShipping();
}

function calculateShipping(){
    const orderInputElement = document.querySelector('.js-calculate-button');
    let cost = Number(orderInputElement.value) * 100;
    if(cost < 4000) cost += 1000;
    const output = document.querySelector('.js-order-cost');
    output.innerHTML = `$${(cost/100).toFixed(2)}`;
    output.classList.remove('success','error');
    output.classList.add(cost>=4000 ? 'success' : 'error');
}

function nameDisplayKeyDown(event){
    if(event.key === 'Enter') nameDisplay();
}

function nameDisplay(){
    const nameElement = document.querySelector('.js-input-name');
    const output = document.querySelector('.js-name-display');
    output.innerHTML = `Your name is: ${nameElement.value}`;
    output.classList.remove('error');
    output.classList.add('success');
}
</script>

</body>
</html>
