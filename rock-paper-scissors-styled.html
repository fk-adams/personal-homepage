<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Final</title>
    <link rel="stylesheet" href="/css/rock-paper-scissors-style.css">
</head>
<body>
    
     <p class="title">Rock Paper Scissors</p>
     <button onclick=" playGame('Rock');"><img src="/img/rock-emoji.png" alt="rock emoji" class="move-icon"></button>

    <button onclick=" playGame('Paper');"><img src="/img/paper-emoji.png" alt="paper emoji" class="move-icon"></button>

    <button onclick=" playGame('Scissors');"><img src="/img/scissors-emoji.png" alt="scissors emoji" class="move-icon"></button> 
    
    <p class="game-move"></p>
    <p class="game-result"></p>
    <p class="game-score"></p>

    <button onclick="
     score.Wins = 0;
     score.Losses = 0;
     score.Ties = 0;
     localStorage.removeItem('score');
     updateScore();
      "> Reset Score</button>


    <script src="./js/rock-paper-scissors-script.js"></script>
</body>
</html>
