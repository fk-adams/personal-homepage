<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/rock-paper-scissors-style.css">
  </head>

  <body>
    <div class="container">
      <p class="title">Rock Paper Scissors</p>

      <div>
        <button onclick="makeMove('rock');" class="move-button">
          <img class="move-icon" src="img/rock-emoji.png">
        </button>

        <button onclick="makeMove('paper');" class="move-button">
          <img class="move-icon" src="img/paper-emoji.png">
        </button>

        <button onclick="makeMove('scissors');" class="move-button">
          <img class="move-icon" src="img/scissors-emoji.png">
        </button>
      </div>

      <p class="result js-result"></p>
      <p class="js-moves-chosen"></p>

      <p class="score js-score"></p>

      <button class="reset-score-button" onclick="resetScore();">
        Reset Score
      </button>
    </div>

    <script src="/js/rock-paper-scissors-script.js"></script>
  </body>
</html>
